<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e0001b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>FoggiaApp PRO</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="appShell">
    <header class="topbar" role="banner">
      <button class="brand" data-nav="home" aria-label="Vai alla home">
        <span class="brand-mark">F</span>
        <span><strong>FoggiaApp</strong><small>percorsi vivi nella città</small></span>
      </button>
      <div class="top-actions">
        <button id="installBtn" class="ghost hidden">Installa</button>
        <button id="langBtn" class="lang-btn" title="Cambia lingua">EN</button>
        <button id="themeBtn" class="icon-btn" title="Cambia atmosfera">◐</button>
      </div>
    </header>

    <main id="view" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Navigazione principale">
      <button class="nav-item active" data-nav="home"><span>⌂</span><small>Home</small></button>
      <button class="nav-item" data-nav="map"><span>▱</span><small>Mappa</small></button>
      <button class="nav-item" data-nav="eat"><span>☕</span><small>Mangia</small></button>
      <button class="nav-item" data-nav="favorites"><span>♡</span><small>Preferiti</small></button>
    </nav>
  </div>

  <template id="emptyState">
    <section class="empty-card">
      <div class="empty-icon">♡</div>
      <h2>Nessun preferito salvato</h2>
      <p>Apri un percorso e usa “Salva nei preferiti”. La scelta resta nel dispositivo, anche senza account.</p>
    </section>
  </template>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./app.js"></script>
</body>
</html>
